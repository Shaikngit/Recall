name: Deploy Production App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build deployment package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $repoRoot = Get-Location
          $stagingPath = Join-Path $repoRoot '.azure/manual-web'
          $zipPath = Join-Path $repoRoot '.azure/manual-web.zip'
          $excludedTopLevel = @('.git', '.azure', '.github', '.vscode', '.venv', '.mykb', '__pycache__')

          if (Test-Path $stagingPath) {
              Remove-Item -Path $stagingPath -Recurse -Force
          }

          New-Item -ItemType Directory -Path $stagingPath -Force | Out-Null

          Get-ChildItem -Path $repoRoot -Force |
              Where-Object { $excludedTopLevel -notcontains $_.Name -and $_.Extension -ne '.zip' } |
              ForEach-Object {
                  Copy-Item $_.FullName -Destination $stagingPath -Recurse -Force
              }

          Get-ChildItem -Path $stagingPath -Recurse -Directory -Force |
              Where-Object { $_.Name -eq '__pycache__' } |
              Remove-Item -Recurse -Force

          Get-ChildItem -Path $stagingPath -Recurse -Include *.pyc | Remove-Item -Force

          if (Test-Path $zipPath) {
              Remove-Item -Path $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $stagingPath '*') -DestinationPath $zipPath -Force

    - name: Deploy to Azure App Service
    shell: pwsh
    env:
      AZUREAPPSERVICE_KUDU_URL: ${{ secrets.AZUREAPPSERVICE_KUDU_URL }}
      AZUREAPPSERVICE_KUDU_USERNAME: ${{ secrets.AZUREAPPSERVICE_KUDU_USERNAME }}
      AZUREAPPSERVICE_KUDU_PASSWORD: ${{ secrets.AZUREAPPSERVICE_KUDU_PASSWORD }}
    run: |
      $ErrorActionPreference = 'Stop'
      $publishUrl = $env:AZUREAPPSERVICE_KUDU_URL
      if (-not $publishUrl) {
        throw 'Missing AZUREAPPSERVICE_KUDU_URL secret.'
      }

      if ($publishUrl -notmatch '^https?://') {
        $publishUrl = "https://$publishUrl"
      }

      $publishUrl = $publishUrl.TrimEnd('/')
      $deployUrl = "$publishUrl/api/zipdeploy?isAsync=true"
      $credentialPair = '{0}:{1}' -f $env:AZUREAPPSERVICE_KUDU_USERNAME, $env:AZUREAPPSERVICE_KUDU_PASSWORD
      $encodedCredential = [Convert]::ToBase64String([System.Text.Encoding]::ASCII.GetBytes($credentialPair))
      $headers = @{ Authorization = "Basic $encodedCredential" }
      $packagePath = Join-Path (Get-Location) '.azure/manual-web.zip'

      $deployResponse = Invoke-WebRequest -Uri $deployUrl -Method Post -Headers $headers -InFile $packagePath -ContentType 'application/zip'
      $statusUrl = $deployResponse.Headers.Location
      if (-not $statusUrl) {
        throw 'ZipDeploy did not return a deployment status URL.'
      }

      for ($attempt = 0; $attempt -lt 120; $attempt++) {
        $statusResponse = Invoke-RestMethod -Uri $statusUrl -Headers $headers -Method Get
        if ($statusResponse.status -eq 4) {
          Write-Host 'ZipDeploy completed successfully.'
          exit 0
        }

        if ($statusResponse.status -eq 3) {
          throw "ZipDeploy failed: $($statusResponse.status_text)"
        }

        Start-Sleep -Seconds 5
      }

      throw 'ZipDeploy timed out waiting for completion.'