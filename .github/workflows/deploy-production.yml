name: Deploy Production App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_URL: https://app-mykbshaikn-th6h7z.azurewebsites.net

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build deployment package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $repoRoot = Get-Location
          $stagingPath = Join-Path $repoRoot '.azure/manual-web'
          $zipPath = Join-Path $repoRoot '.azure/manual-web.zip'
          $excludedTopLevel = @('.git', '.azure', '.github', '.vscode', '.venv', '.mykb', '__pycache__')

          if (Test-Path $stagingPath) {
              Remove-Item -Path $stagingPath -Recurse -Force
          }

          New-Item -ItemType Directory -Path $stagingPath -Force | Out-Null

          Get-ChildItem -Path $repoRoot -Force |
              Where-Object { $excludedTopLevel -notcontains $_.Name -and $_.Extension -ne '.zip' } |
              ForEach-Object {
                  Copy-Item $_.FullName -Destination $stagingPath -Recurse -Force
              }

          Get-ChildItem -Path $stagingPath -Recurse -Directory -Force |
              Where-Object { $_.Name -eq '__pycache__' } |
              Remove-Item -Recurse -Force

          Get-ChildItem -Path $stagingPath -Recurse -Include *.pyc | Remove-Item -Force

          if (Test-Path $zipPath) {
              Remove-Item -Path $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $stagingPath '*') -DestinationPath $zipPath -Force

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        shell: bash
        run: |
          az webapp deploy \
            --resource-group rg-mykb-shaikn \
            --name app-mykbshaikn-th6h7z \
            --src-path .azure/manual-web.zip \
            --type zip \
            --clean true \
            --restart true \
            --track-status true \
            --async false \
            --timeout 600000

      - name: Run post-deploy smoke test
        shell: pwsh
        run: .\scripts\smoke-test.ps1 -BaseUrl $env:APP_URL